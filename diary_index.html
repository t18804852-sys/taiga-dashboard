<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日記インデックス — Taiga Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0a0c10;--sf:#13161e;--sf2:#1a1f29;--gold:#d4b370;--gold2:#e0c488;--grn:#50c88c;--red:#e07060;--blue:#5090c8;--purple:#9070c8;--dim:rgba(220,220,230,0.4);--txt:#e0e2e8;--faint:rgba(220,220,230,0.1)}
  body{background:var(--bg);color:var(--txt);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:60px}

  .header{text-align:center;padding:40px 20px 24px;background:linear-gradient(180deg,var(--sf),transparent)}
  .header .label{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;color:var(--purple);margin-bottom:8px}
  .header h1{font-size:22px;font-weight:900;margin-bottom:6px;letter-spacing:0.05em}
  .header .sub{font-size:12px;color:var(--dim)}

  .container{max-width:600px;margin:0 auto;padding:0 16px}

  .back{display:inline-block;margin:10px 0 20px;padding:6px 14px;background:var(--sf);border:1px solid var(--faint);border-radius:6px;color:var(--dim);font-size:11px;text-decoration:none}
  .back:active{background:var(--sf2)}

  /* Summary stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0}
  .stat{padding:12px;background:var(--sf);border:1px solid var(--faint);border-radius:8px;text-align:center}
  .stat .label{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--dim);margin-bottom:4px}
  .stat .value{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--gold)}
  .stat .unit{font-size:10px;color:var(--dim);margin-left:2px}

  /* Month toggle */
  .month{margin-bottom:12px;background:var(--sf);border:1px solid var(--faint);border-radius:10px;overflow:hidden}
  .month-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:var(--sf);user-select:none}
  .month-head:active{background:var(--sf2)}
  .month-title{display:flex;align-items:center;gap:10px}
  .month-title .num{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--gold)}
  .month-title .name{font-size:12px;color:var(--dim)}
  .month-meta{display:flex;align-items:center;gap:10px}
  .month-meta .count{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--dim);letter-spacing:1px}
  .month-meta .avg{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--gold2);padding:3px 8px;background:rgba(212,179,112,0.1);border-radius:4px}
  .month-meta .arrow{transition:transform 0.3s;font-size:10px;color:var(--dim)}
  .month.open .arrow{transform:rotate(180deg)}

  .month-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
  .month.open .month-body{max-height:3000px}
  .month-inner{padding:4px 12px 14px}

  /* Diary entry */
  .entry{display:block;padding:12px;margin-bottom:6px;background:var(--sf2);border:1px solid var(--faint);border-radius:8px;text-decoration:none;color:var(--txt);border-left:3px solid var(--gold)}
  .entry:active{background:var(--sf)}
  .entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .entry-date{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--gold)}
  .entry-score{font-family:'Orbitron',sans-serif;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700}
  .score-high{background:rgba(80,200,140,0.15);color:var(--grn)}
  .score-mid{background:rgba(212,179,112,0.15);color:var(--gold)}
  .score-low{background:rgba(224,112,96,0.15);color:var(--red)}
  .entry-title{font-size:13px;font-weight:600;margin-bottom:3px}
  .entry-summary{font-size:11px;color:var(--dim);line-height:1.7}
  .entry-tags{margin-top:6px;display:flex;gap:4px;flex-wrap:wrap}
  .tag{font-size:9px;padding:2px 6px;background:var(--faint);color:var(--dim);border-radius:3px;font-family:'Orbitron',sans-serif;letter-spacing:1px}

  .empty{padding:30px 20px;text-align:center;color:var(--dim);font-size:12px}

  .footer{text-align:center;padding:30px 20px 0;font-size:10px;color:var(--dim);letter-spacing:1px;line-height:2}
</style>
</head>
<body>

<div class="header">
  <div class="label">DIARY INDEX</div>
  <h1>日記インデックス</h1>
  <div class="sub">日々の振り返り × 点数化 × 成長の可視化</div>
</div>

<div class="container">
  <a href="./" class="back">← ダッシュボードに戻る</a>

  <div class="stats">
    <div class="stat"><div class="label">TOTAL DAYS</div><div class="value" id="total-days">1</div></div>
    <div class="stat"><div class="label">AVG SCORE</div><div class="value" id="avg-score">19</div><div class="unit">/25</div></div>
    <div class="stat"><div class="label">STREAK</div><div class="value" id="streak">1</div><div class="unit">日</div></div>
  </div>

  <!-- ═══ 2026年4月 ═══ -->
  <div class="month open">
    <div class="month-head" onclick="this.parentElement.classList.toggle('open')">
      <div class="month-title">
        <div class="num">2026.04</div>
        <div class="name">APRIL</div>
      </div>
      <div class="month-meta">
        <div class="count">1 ENTRY</div>
        <div class="avg">19/25</div>
        <div class="arrow">▼</div>
      </div>
    </div>
    <div class="month-body">
      <div class="month-inner">

        <a class="entry" href="diary_2026-04-14.html">
          <div class="entry-head">
            <div class="entry-date">04.14 TUE</div>
            <div class="entry-score score-mid">19/25</div>
          </div>
          <div class="entry-title">親父との対話 × 今日のボス</div>
          <div class="entry-summary">ボス倒した。個人主義が出た。親父の5層分解。自分のズレ5個。核心：親父が評価しない軸で勝て</div>
          <div class="entry-tags">
            <span class="tag">BOSS ✓</span>
            <span class="tag">親父対話</span>
            <span class="tag">個人主義</span>
          </div>
        </a>

      </div>
    </div>
  </div>

</div>

<div class="footer">
  Daily reflection × Objective scoring<br>
  <strong style="color:var(--gold)">点数を上げることが目的じゃない。<br>自己認識の精度を上げることが目的</strong>
</div>

</body>
</html>
